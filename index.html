<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和我一起读书</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #faf8f4;
  --ink: #2c2c2c;
  --ink-light: #888;
  --ink-faint: #bbb;
  --her: #f5e9c4;
  --her-text: #C9A84C;
  --me: #f0dada;
  --me-text: #721817;
  --highlight: #f5f0e8;
  --border: #e8e4dc;
  --serif: 'Noto Serif SC', 'STSong', 'SimSun', serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
}

.screen { display: none; }
.screen.active { display: block; }

/* ===== 书单页 ===== */
#bookListScreen {
  max-width: 440px;
  margin: 0 auto;
  padding: 60px 28px 80px;
}

.site-title {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 48px;
}

.book-item {
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
}
.book-item:first-of-type { border-top: 1px solid var(--border); }

.book-item-title {
  font-size: 18px;
  font-weight: 500;
  transition: color 0.2s;
}
.book-item:hover .book-item-title { color: var(--ink-light); }
.book-item-meta { font-size: 12px; color: var(--ink-faint); white-space: nowrap; }

.empty-state {
  padding: 60px 0 20px;
  color: var(--ink-faint);
  font-size: 15px;
  text-align: center;
}

/* 上传 */
.upload-trigger {
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink-faint);
  font-size: 13px;
  cursor: pointer;
  width: fit-content;
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
.upload-trigger:hover { color: var(--ink-light); }
.upload-trigger span { font-size: 18px; line-height: 1; }

.upload-form {
  margin-top: 20px;
  padding: 24px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  display: none;
}
.upload-form input[type=text] {
  width: 100%;
  padding: 10px 0;
  border: none;
  border-bottom: 1px solid var(--border);
  font-family: var(--serif);
  font-size: 15px;
  background: transparent;
  outline: none;
  margin-bottom: 16px;
  color: var(--ink);
}
.upload-form input[type=text]::placeholder { color: var(--ink-faint); }
.upload-form input[type=text]:focus { border-bottom-color: var(--ink-light); }

.file-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--ink-faint);
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 20px;
}
.file-label:hover { color: var(--ink-light); }
input[type=file] { display: none; }

.do-upload-btn {
  padding: 9px 24px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  font-family: var(--serif);
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: opacity 0.2s;
}
.do-upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.do-upload-btn:hover:not(:disabled) { opacity: 0.75; }

/* ===== 阅读页 ===== */
#readScreen { max-width: 600px; margin: 0 auto; }

.read-nav {
  position: sticky;
  top: 0;
  z-index: 30;
  background: var(--paper);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.nav-back {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink-faint);
  cursor: pointer;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--ink); }

.nav-title {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
}

.nav-progress {
  font-size: 12px;
  color: var(--ink-faint);
}

/* 书页正文 */
.book-body {
  padding: 40px 44px 100px;
}

/* 单个段落 */
.para {
  position: relative;
  margin-bottom: 0;
}

.para-text {
  font-size: 17px;
  line-height: 2;
  color: var(--ink);
  padding: 8px 0;
  cursor: pointer;
  transition: background 0.2s;
  border-radius: 3px;
  padding-left: 4px;
  padding-right: 4px;
  margin-left: -4px;
  margin-right: -4px;
}

.para.has-comment .para-text { color: var(--ink); }
.para.has-comment .para-text::after {
  content: '';
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--ink-faint);
  border-radius: 50%;
  vertical-align: super;
  margin-left: 4px;
  font-size: 10px;
}

.para-text:hover { background: var(--highlight); }
.para.active .para-text { background: var(--highlight); }

/* 展开区域 */
.para-drawer {
  display: none;
  padding: 16px 0 20px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}
.para.active .para-drawer { display: block; }

.copy-row {
  margin-bottom: 14px;
}
.copy-line-btn {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 12px;
  color: var(--ink-faint);
  cursor: pointer;
  letter-spacing: 0.5px;
  padding: 0;
  transition: color 0.2s;
}
.copy-line-btn:hover { color: var(--ink); }
.copy-line-btn.done { color: #5a8a6a; }

/* 评论气泡 */
.bubbles { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

.bubble {
  max-width: 80%;
  padding: 9px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.65;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
}
.bubble.cerberus { background: var(--me); color: var(--me-text); align-self: flex-start; }
.bubble.annie { background: var(--her); color: var(--her-text); align-self: flex-end; }
.bubble-who { font-size: 11px; opacity: 0.5; margin-top: 3px; }

/* 输入区 */
.comment-box {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.who-row {
  display: flex;
  gap: 8px;
}
.who-chip {
  padding: 4px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-family: var(--serif);
  font-size: 12px;
  color: var(--ink-faint);
  cursor: pointer;
  background: none;
  transition: all 0.15s;
}
.who-chip.cerberus.on { background: var(--me); border-color: var(--me); color: var(--me-text); }
.who-chip.annie.on { background: var(--her); border-color: var(--her); color: var(--her-text); }

.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.comment-input-field {
  flex: 1;
  padding: 8px 0;
  border: none;
  border-bottom: 1px solid var(--border);
  font-family: var(--serif);
  font-size: 14px;
  background: transparent;
  outline: none;
  color: var(--ink);
}
.comment-input-field:focus { border-bottom-color: var(--ink-light); }
.comment-input-field::placeholder { color: var(--ink-faint); }

.send-btn {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink-faint);
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: color 0.2s;
  white-space: nowrap;
}
.send-btn:hover { color: var(--ink); }

/* 导出按钮 */
.export-btn {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 12px;
  color: var(--ink-faint);
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
.export-btn:hover { color: var(--ink); }

/* 导出弹窗 */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: white;
  border-radius: 12px 12px 0 0;
  padding: 28px 24px 40px;
  width: 100%;
  max-width: 480px;
}
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 20px; display: flex; justify-content: space-between; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink-faint); line-height: 1; }

.export-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.export-tab {
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  font-family: var(--serif); font-size: 13px;
  color: var(--ink-faint); cursor: pointer; background: none;
}
.export-tab.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

.export-preview {
  background: var(--paper);
  border-radius: 8px;
  padding: 16px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--ink);
  max-height: 240px;
  overflow-y: auto;
  white-space: pre-wrap;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  margin-bottom: 16px;
}

.copy-all-btn {
  width: 100%;
  padding: 13px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  font-family: var(--serif);
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 1px;
  border-radius: 8px;
}
.copy-all-btn:hover { opacity: 0.8; }

.loading-text { text-align: center; padding: 60px; color: var(--ink-faint); font-size: 15px; letter-spacing: 1px; }

/* 分页加载 */
.load-more-bar {
  text-align: center;
  padding: 24px;
}
.load-more-btn {
  background: none;
  border: 1px solid var(--border);
  padding: 8px 24px;
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink-faint);
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.load-more-btn:hover { border-color: var(--ink-light); color: var(--ink); }
</style>
</head>
<body>

<!-- 书单页 -->
<div id="bookListScreen" class="screen active">
  <div style="max-width:440px;margin:0 auto;padding:60px 28px 80px">
    <div class="site-title">和我一起读书</div>
    <div id="bookList"><div class="loading-text">…</div></div>
    <div class="upload-trigger" onclick="toggleUpload()">
      <span>＋</span> 上传新书
    </div>
    <div class="upload-form" id="uploadForm">
      <input type="text" id="bookNameInput" placeholder="书名">
      <label class="file-label" for="fileInput">
        <span>📄</span><span id="fileLabelText">选择 txt 文件</span>
      </label>
      <input type="file" id="fileInput" accept=".txt" onchange="onFilePick(this)">
      <button class="do-upload-btn" id="startBtn" onclick="doUpload()">上传</button>
    </div>
  </div>
</div>

<!-- 阅读页 -->
<div id="readScreen" class="screen">
  <div class="read-nav">
    <button class="nav-back" onclick="goBack()">← 返回</button>
    <div class="nav-title" id="navTitle"></div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="nav-progress" id="navProgress"></span>
      <button class="export-btn" onclick="openExport()">导出评论</button>
    </div>
  </div>
  <div class="book-body" id="bookBody"></div>
</div>

<!-- 导出弹窗 -->
<div class="modal-backdrop" id="exportModal" onclick="closeExport(event)">
  <div class="modal">
    <div class="modal-title">
      <span>导出评论</span>
      <button class="modal-close" onclick="closeExport()">×</button>
    </div>
    <div class="export-tabs">
      <button class="export-tab on" onclick="switchExportTab('all',this)">全部</button>
      <button class="export-tab" onclick="switchExportTab('page',this)">当前页</button>
    </div>
    <div class="export-preview" id="exportPreview"></div>
    <button class="copy-all-btn" onclick="copyExport()">复制到剪贴板</button>
  </div>
</div>

<script>
const URL_ = 'https://pgriditlwhypjbeugisd.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBncmlkaXRsd2h5cGpiZXVnaXNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc3NjcsImV4cCI6MjA5MDM2Mzc2N30.7hWLIkQ0kLNK8hjyivPAFSbxM0p24eaLJYZuL8lyK70';
const PAGE_SIZE = 30;

async function db(table, opts = {}) {
  const { method = 'GET', body, params } = opts;
  let url = `${URL_}/rest/v1/${table}`;
  if (params) url += '?' + new URLSearchParams(params);
  const headers = { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const text = await res.text();
  if (!res.ok) throw new Error(text);
  return text ? JSON.parse(text) : [];
}

// ---- 状态 ----
let curTitle = '';
let curParas = [];
let curComments = {};
let openIdx = null;
let who = 'annie';
let pageOffset = 0;
let totalCount = 0;

// ---- 工具 ----
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goBack(){ openIdx=null; show('bookListScreen'); loadBooks(); }

// ---- 书单 ----
async function loadBooks() {
  const el = document.getElementById('bookList');
  el.innerHTML = '<div class="loading-text">…</div>';
  try {
    const rows = await db('books', { params: { select: 'title', order: 'created_at.asc' } });
    const seen = [], titles = [];
    rows.forEach(r => { if (!seen.includes(r.title)) { seen.push(r.title); titles.push(r.title); } });
    if (!titles.length) { el.innerHTML = '<div class="empty-state">还没有书</div>'; return; }
    el.innerHTML = titles.map(t => {
      const prog = parseInt(localStorage.getItem('prog_' + t) || 0);
      return `<div class="book-item" onclick="openBook('${escAttr(t)}')">
        <div class="book-item-title">${esc(t)}</div>
        <div class="book-item-meta">第 ${prog+1} 段</div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = '<div class="empty-state">加载失败，刷新试试</div>'; }
}

function escAttr(s){ return String(s).replace(/'/g,"\\'"); }

// ---- 打开书 ----
async function openBook(title) {
  curTitle = title;
  curParas = [];
  curComments = {};
  openIdx = null;
  pageOffset = 0;
  show('readScreen');
  document.getElementById('navTitle').textContent = title;
  document.getElementById('bookBody').innerHTML = '<div class="loading-text">…</div>';

  // 获取总数
  try {
    const countRes = await fetch(`${URL_}/rest/v1/books?select=id&title=eq.${encodeURIComponent(title)}`, {
      headers: { apikey: KEY, Authorization: `Bearer ${KEY}`, Prefer: 'count=exact' }
    });
    totalCount = parseInt(countRes.headers.get('content-range')?.split('/')[1] || '0');
  } catch(e) { totalCount = 0; }

  await loadPage();

  const savedIdx = parseInt(localStorage.getItem('prog_' + title) || 0);
  setTimeout(() => {
    const el = document.getElementById('para-' + savedIdx);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}

async function loadPage() {
  try {
    const newParas = await db('books', {
      params: {
        select: 'id,paragraph_index,content',
        title: `eq.${curTitle}`,
        order: 'paragraph_index.asc',
        limit: PAGE_SIZE,
        offset: pageOffset
      }
    });
    curParas = [...curParas, ...newParas];
    pageOffset += newParas.length;
    renderBook();
  } catch(e) {
    document.getElementById('bookBody').innerHTML = '<div class="loading-text">加载失败</div>';
  }
}

function renderBook() {
  const savedIdx = parseInt(localStorage.getItem('prog_' + curTitle) || 0);
  updateProgress(savedIdx);

  const html = curParas.map((p, i) => {
    const cs = curComments[p.paragraph_index] || [];
    const hasComment = cs.length > 0;
    const isOpen = openIdx === i;
    return `<div class="para${isOpen?' active':''}${hasComment?' has-comment':''}" id="para-${i}">
      <div class="para-text" onclick="togglePara(${i})"><span style="font-size:11px;color:var(--ink-faint);margin-right:10px;user-select:none;">${i+1}</span>${esc(p.content)}</div>
      ${isOpen ? drawerHtml(p, i, cs) : '<div class="para-drawer"></div>'}
    </div>`;
  }).join('');

  const hasMore = curParas.length < totalCount;
  const moreBtn = hasMore ? `<div class="load-more-bar"><button class="load-more-btn" onclick="loadPage()">加载更多 · ${curParas.length}/${totalCount}</button></div>` : '';

  document.getElementById('bookBody').innerHTML = html + moreBtn;
}

function drawerHtml(p, i, cs) {
  const bubblesHtml = cs.map(c => {
    const author = normalizeAuthor(c.author);
    return `<div class="bubble ${author}" id="bub-${c.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <span>${esc(c.comment)}</span>
        <button onclick="deleteComment(event,'${c.id}',${i})" style="background:none;border:none;cursor:pointer;opacity:0.3;font-size:12px;padding:0;line-height:1;flex-shrink:0" title="删除">×</button>
      </div>
      <div class="bubble-who" style="color:${author==='cerberus'?'#721817':'#C9A84C'}">${author==='cerberus'?'Cerberus':'Annie'}</div>
    </div>`;
  }).join('');
  return `<div class="para-drawer">
    <div class="copy-row">
      <button class="copy-line-btn" id="cpb-${i}" onclick="doCopy(event,${i})">复制这段</button>
    </div>
    <div class="bubbles" id="bl-${i}">${bubblesHtml}</div>
    <div class="comment-box">
      <div class="who-row">
        <button class="who-chip me${who==='cerberus'?' on':''}" onclick="pickWho(event,'cerberus',${i})">Cerberus</button>
        <button class="who-chip her${who==='annie'?' on':''}" onclick="pickWho(event,'annie',${i})">Annie</button>
      </div>
      <div class="input-row">
        <input class="comment-input-field" id="ci-${i}" placeholder="写点什么…"
          onkeydown="if(event.key==='Enter')doComment(event,${i})"
          onclick="event.stopPropagation()">
        <button class="send-btn" onclick="doComment(event,${i})">发送</button>
      </div>
    </div>
  </div>`;
}

function updateProgress(idx) {
  document.getElementById('navProgress').textContent = `${idx+1}–${Math.min(idx+PAGE_SIZE, totalCount)} / ${totalCount}`;
}

async function togglePara(idx) {
  if (openIdx === idx) { openIdx = null; renderBook(); return; }
  openIdx = idx;

  const para = curParas[idx];
  localStorage.setItem('prog_' + curTitle, idx);
  updateProgress(idx);

  if (!curComments[para.paragraph_index]) {
    try {
      const res = await fetch(
        `${URL_}/rest/v1/book_comments?select=id,book_id,paragraph_index,author,comment,created_at&book_id=eq.${para.id}&order=created_at.asc`,
        { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } }
      );
      curComments[para.paragraph_index] = await res.json();
    } catch(e) { curComments[para.paragraph_index] = []; }
  }

  renderBook();
  setTimeout(() => {
    document.getElementById('para-' + idx)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function doCopy(event, idx) {
  event.stopPropagation();
  navigator.clipboard.writeText(curParas[idx]?.content || '').then(() => {
    const btn = document.getElementById('cpb-' + idx);
    if (!btn) return;
    btn.textContent = '已复制';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = '复制这段'; btn.classList.remove('done'); }, 2000);
  });
}

function pickWho(event, val, paraIdx) {
  event.stopPropagation();
  who = val;
  ['cerberus','annie'].forEach(w => {
    document.querySelector(`#para-${paraIdx} .who-chip.${w}`)?.classList.toggle('on', w===val);
  });
}

async function doComment(event, idx) {
  event.stopPropagation();
  const input = document.getElementById('ci-' + idx);
  const text = input.value.trim();
  if (!text) return;
  const para = curParas[idx];
  try {
    await db('book_comments', {
      method: 'POST',
      body: { book_id: para.id, paragraph_index: para.paragraph_index, author: who, comment: text }
    });
    if (!curComments[para.paragraph_index]) curComments[para.paragraph_index] = [];
    curComments[para.paragraph_index].push({ author: who, comment: text });

    const bl = document.getElementById('bl-' + idx);
    const bubble = document.createElement('div');
    bubble.className = `bubble ${who}`;
    bubble.innerHTML = `${esc(text)}<div class="bubble-who" style="color:${who==='cerberus'?'#721817':'#C9A84C'}">${who==='cerberus'?'Cerberus':'Annie'}</div>`;
    bl.appendChild(bubble);
    input.value = '';

    // 更新 has-comment 标记
    document.getElementById('para-' + idx)?.classList.add('has-comment');
    bubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch(e) { alert('发送失败'); }
}

// ---- 上传 ----
function toggleUpload() {
  const f = document.getElementById('uploadForm');
  f.style.display = f.style.display === 'block' ? 'none' : 'block';
}

let pickedFile = null;
function onFilePick(input) {
  pickedFile = input.files[0];
  document.getElementById('fileLabelText').textContent = pickedFile?.name || '选择 txt 文件';
}

async function doUpload() {
  const title = document.getElementById('bookNameInput').value.trim();
  if (!title) { alert('请填写书名'); return; }
  if (!pickedFile) { alert('请选择 txt 文件'); return; }
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  try {
    const text = await readTxt(pickedFile);
    const paras = text.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
    if (!paras.length) { alert('文件是空的？'); return; }
    for (let i = 0; i < paras.length; i += 50) {
      const batch = paras.slice(i,i+50).map((content,j) => ({ title, paragraph_index: i+j, content }));
      await db('books', { method: 'POST', body: batch });
      btn.textContent = `${Math.min(i+50,paras.length)} / ${paras.length}`;
    }
    alert(`上传完成，共 ${paras.length} 段`);
    document.getElementById('uploadForm').style.display = 'none';
    document.getElementById('bookNameInput').value = '';
    document.getElementById('fileLabelText').textContent = '选择 txt 文件';
    pickedFile = null;
    loadBooks();
  } catch(e) {
    alert('上传失败：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '上传';
  }
}

function readTxt(file) {
  return new Promise((ok, fail) => {
    const r = new FileReader();
    r.onload = e => {
      const text = e.target.result;
      if (text.includes('\uFFFD')) {
        const r2 = new FileReader();
        r2.onload = e2 => ok(e2.target.result);
        r2.onerror = fail;
        r2.readAsText(file, 'GBK');
      } else ok(text);
    };
    r.onerror = fail;
    r.readAsText(file, 'UTF-8');
  });
}

// ---- 导出 ----
let exportTab = 'all';
let allExportComments = [];

async function openExport() {
  // 拉所有有评论的段落
  try {
    const allComments = await fetch(
      `${URL_}/rest/v1/book_comments?select=*,books!book_id(title,paragraph_index,content)&order=created_at.asc`,
      { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } }
    ).then(r => r.json());

    // 只过滤当前书
    allExportComments = allComments.filter(c => c.books?.title === curTitle);
  } catch(e) { allExportComments = []; }

  exportTab = 'all';
  document.querySelectorAll('.export-tab').forEach((t,i) => t.classList.toggle('on', i===0));
  renderExportPreview();
  document.getElementById('exportModal').classList.add('open');
}

function closeExport(event) {
  if (!event || event.target === document.getElementById('exportModal')) {
    document.getElementById('exportModal').classList.remove('open');
  }
}

function switchExportTab(tab, el) {
  exportTab = tab;
  document.querySelectorAll('.export-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderExportPreview();
}

function renderExportPreview() {
  // 按段落分组
  const grouped = {};
  let source = allExportComments;
  if (exportTab === 'page') {
    const pageParaIndices = curParas.map(p => p.paragraph_index);
    source = allExportComments.filter(c => pageParaIndices.includes(c.paragraph_index));
  }

  source.forEach(c => {
    const pi = c.paragraph_index;
    if (!grouped[pi]) grouped[pi] = { content: c.books?.content || '', comments: [] };
    grouped[pi].comments.push(c);
  });

  const lines = [`《${curTitle}》评论\n`];
  Object.keys(grouped).sort((a,b)=>a-b).forEach(pi => {
    const g = grouped[pi];
    const snippet = g.content.length > 40 ? g.content.slice(0,40) + '……' : g.content;
    lines.push(`【第${parseInt(pi)+1}段】"${snippet}"`);
    g.comments.forEach(c => {
      lines.push(`${c.author==='cerberus'?'Cerberus':'Annie'}：${c.comment}`);
    });
    lines.push('');
  });

  document.getElementById('exportPreview').textContent = lines.join('\n');
}

function copyExport() {
  const text = document.getElementById('exportPreview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制到剪贴板', 2000);
  });
}
